<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Tool</title>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f4f4f4;
        }

        header {
            padding: 12px;
            text-align: center;
            background: #222;
            color: #fff;
        }

        .container {
            padding: 10px;
            max-width: 900px;
            margin: auto;
        }

        .upload {
            border: 2px dashed #aaa;
            padding: 15px;
            text-align: center;
            margin-bottom: 10px;
            background: #fff;
        }

        .image-card {
            background: #fff;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 10px;
            position: relative;
        }

        .preview-box {
            width: 100%;
            height: 50vh;
            min-height: 300px;
        }

        .preview-box img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .delete-btn {
            z-index: 10;
            position: absolute;
            top: 8px;
            right: 8px;
            background: red;
            color: #fff;
            border: none;
            padding: 6px 10px;
            border-radius: 6px;
        }

        .controls {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .row {
            display: flex;
            gap: 10px;
        }

        .row>* {
            flex: 1;
        }

        input,
        select {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #007bff;
            color: #fff;
        }

        button.secondary {
            background: #555;
        }

        button.danger {
            background: #dc3545;
        }

        .center-actions {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
    </style>
</head>

<body>
    <header>
        <h3>Photo Compressor & Cropper</h3>
    </header>

    <div class="container">
        <div class="upload">
            <input type="file" id="fileInput" multiple accept="image/*">
        </div>
        <div id="imageList"></div>
        <div class="center-actions">
            <button id="downloadZip">Download all as ZIP</button>
            <!-- <button id="downloadAllPdf" class="secondary">Download all as PDF</button> -->
        </div>
    </div>

    <div class="modal" id="downloadModal">
        <div class="modal-content">
            <p>Download as:</p>
            <button id="downloadJpeg">JPEG</button>
            <button id="downloadPdf">PDF</button>
        </div>
    </div>

    <script>
        const { jsPDF } = window.jspdf;
        let cropperMap = {};
        let currentDownloadImg = null;

        $('#fileInput').on('change', function (e) {
            for (let file of e.target.files) {
                const reader = new FileReader();
                reader.onload = e => addImage(e.target.result, file.name);
                reader.readAsDataURL(file);
            }
        });

        function addImage(src, fileName) {
            const id = Date.now() + Math.random();

            $('#imageList').append(`
  <div class="image-card" data-id="${id}" data-name="${fileName}" data-original="${src}">
    <button class="delete-btn">X</button>

    <div class="preview-box">
      <img src="${src}" id="img_${id}">
    </div>

    <div class="controls">
      <div class="row">
        <select class="ratio">
          <option value="NaN">Free</option>
          <option value="1">1:1</option>
          <option value="1.777">16:9</option>
        </select>
        <input type="number" class="targetSize" placeholder="Size (KB)">
        <button class="compress">Compress</button>
      </div>

      <div class="row">
        <button class="cropBtn">Start Crop</button>
        <button class="resetCrop danger" style="display:none;">Reset</button>
        <button class="downloadBtn">Download</button>
      </div>
    </div>
  </div>`);
        }

        // DELETE
        $(document).on('click', '.delete-btn', function () {
            if (confirm('Remove this image?')) {
                $(this).closest('.image-card').remove();
            }
        });

        // CROP
        $(document).on('click', '.cropBtn', function () {
            const card = $(this).closest('.image-card');
            const id = card.data('id');
            const img = document.getElementById('img_' + id);

            if (cropperMap[id]) {
                const canvas = cropperMap[id].getCroppedCanvas();
                img.src = canvas.toDataURL('image/jpeg', 0.9);
                cropperMap[id].destroy();
                cropperMap[id] = null;
                $(this).text('Start Crop');
                card.find('.resetCrop').hide();
                return;
            }

            const ratioVal = card.find('.ratio').val();
            const ratio = ratioVal === 'NaN' ? NaN : parseFloat(ratioVal);

            cropperMap[id] = new Cropper(img, {
                aspectRatio: ratio,
                viewMode: 1,
                autoCropArea: 1
            });

            $(this).text('Apply Crop');
            card.find('.resetCrop').show();
        });

        // RESET (restore ORIGINAL)
        $(document).on('click', '.resetCrop', function () {
            const card = $(this).closest('.image-card');
            const id = card.data('id');
            const img = document.getElementById('img_' + id);
            const original = card.attr('data-original');

            img.src = original;

            if (cropperMap[id]) {
                cropperMap[id].destroy();
                cropperMap[id] = null;
            }

            card.find('.cropBtn').text('Start Crop');
            card.find('.resetCrop').hide();
        });

        // COMPRESS (non-destructive)
        $(document).on('click', '.compress', function () {
            const card = $(this).closest('.image-card');
            const img = card.find('img')[0];
            const original = card.attr('data-original');
            const targetKB = parseFloat(card.find('.targetSize').val());

            if (!targetKB) return alert('Enter size');

            let tempImg = new Image();
            tempImg.src = img.src;

            tempImg.onload = function () {
                let canvas = document.createElement('canvas');
                let ctx = canvas.getContext('2d');
                canvas.width = tempImg.width;
                canvas.height = tempImg.height;
                ctx.drawImage(tempImg, 0, 0);

                let quality = 0.9;
                let dataUrl;

                for (let i = 0; i < 12; i++) {
                    dataUrl = canvas.toDataURL('image/jpeg', quality);
                    let sizeKB = Math.round((dataUrl.length * 3) / 4 / 1024);
                    if (sizeKB <= targetKB) break;
                    quality -= 0.07;
                }

                img.src = dataUrl;
            };
        });

        // DOWNLOAD MODAL
        $(document).on('click', '.downloadBtn', function () {
            currentDownloadImg = $(this).closest('.image-card').find('img')[0];
            $('#downloadModal').css('display', 'flex');
        });

        $('#downloadJpeg').click(function () {
            const card = $(currentDownloadImg).closest('.image-card');
            const name = card.data('name');

            const a = document.createElement('a');
            a.href = currentDownloadImg.src;
            a.download = name;
            a.click();

            $('#downloadModal').hide();
        });

        $('#downloadPdf').click(function () {
            const card = $(currentDownloadImg).closest('.image-card');
            const name = card.data('name');

            const pdf = new jsPDF();
            const img = currentDownloadImg;
            const width = pdf.internal.pageSize.getWidth();
            const height = (img.naturalHeight * width) / img.naturalWidth;
            pdf.addImage(img.src, 'JPEG', 0, 0, width, height);
            pdf.save(name.replace(/\.[^/.]+$/, '') + '.pdf');

            $('#downloadModal').hide();
        });

        $('#downloadModal').click(function (e) {
            if (e.target.id === 'downloadModal') $(this).hide();
        });

        // BULK
        $('#downloadAllPdf').on('click', function () {
            const pdf = new jsPDF();
            let first = true;

            $('#imageList .image-card').each(function () {
                const img = $(this).find('img')[0];
                if (!first) pdf.addPage();
                first = false;

                const width = pdf.internal.pageSize.getWidth();
                const height = (img.naturalHeight * width) / img.naturalWidth;
                pdf.addImage(img.src, 'JPEG', 0, 0, width, height);
            });

            pdf.save('all-images.pdf');
        });

        $('#downloadZip').on('click', function () {
            const zip = new JSZip();

            $('#imageList .image-card').each(function (i) {
                const img = $(this).find('img')[0];
                const name = $(this).data('name') || `image_${i}.jpg`;
                const base64 = img.src.split(',')[1];
                zip.file(name, base64, { base64: true });
            });

            zip.generateAsync({ type: 'blob' }).then(blob => {
                saveAs(blob, 'images.zip');
            });
        });
    </script>
</body>

</html>
