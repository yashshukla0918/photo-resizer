<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Tool</title>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #e0e0e0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            padding: 24px;
            text-align: center;
            background: linear-gradient(135deg, rgba(15, 12, 41, 0.9), rgba(48, 43, 99, 0.9));
            color: #fff;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border-bottom: 2px solid rgba(100, 200, 255, 0.3);
        }

        header h3 {
            font-size: 2.2em;
            font-weight: 600;
            background: linear-gradient(135deg, #64c8ff, #8e44ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
        }

        .container {
            padding: 30px 20px;
            max-width: 1000px;
            margin: auto;
        }

        .upload {
            border: 3px dashed rgba(100, 200, 255, 0.5);
            padding: 40px;
            text-align: center;
            margin-bottom: 30px;
            background: linear-gradient(135deg, rgba(100, 200, 255, 0.05), rgba(142, 68, 255, 0.05));
            border-radius: 15px;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
        }

        .upload:hover {
            border-color: rgba(100, 200, 255, 0.8);
            background: linear-gradient(135deg, rgba(100, 200, 255, 0.1), rgba(142, 68, 255, 0.1));
            box-shadow: 0 0 20px rgba(100, 200, 255, 0.2);
        }

        .upload input {
            display: none;
        }

        .upload::before {
            content: '📤 Click to upload or drag files';
            display: block;
            font-size: 1.1em;
            color: #64c8ff;
            font-weight: 500;
            margin-bottom: 10px;
        }

        .image-card {
            background: linear-gradient(135deg, rgba(48, 43, 99, 0.4), rgba(24, 36, 63, 0.4));
            padding: 20px;
            margin-bottom: 25px;
            border-radius: 15px;
            position: relative;
            border: 2px solid rgba(100, 200, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .image-card:hover {
            border-color: rgba(100, 200, 255, 0.4);
            box-shadow: 0 8px 32px rgba(100, 200, 255, 0.1);
        }

        .preview-box {
            width: 100%;
            height: 50vh;
            min-height: 300px;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(100, 200, 255, 0.2);
        }

        .preview-box img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .delete-btn {
            z-index: 10;
            position: absolute;
            top: 12px;
            right: 12px;
            background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
            color: #fff;
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);
        }

        .delete-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.5);
        }

        .controls {
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .row {
            display: flex;
            gap: 10px;
        }

        .row>* {
            flex: 1;
        }

        input,
        select {
            padding: 12px 15px;
            border-radius: 8px;
            border: 2px solid rgba(100, 200, 255, 0.3);
            background: rgba(48, 43, 99, 0.3);
            color: #e0e0e0;
            font-size: 0.95em;
            transition: all 0.3s ease;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #64c8ff;
            background: rgba(100, 200, 255, 0.1);
            box-shadow: 0 0 15px rgba(100, 200, 255, 0.3);
        }

        input::placeholder {
            color: rgba(224, 224, 224, 0.5);
        }

        button {
            padding: 12px 16px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #64c8ff, #8e44ff);
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(100, 200, 255, 0.3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 0.9em;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(100, 200, 255, 0.5);
        }

        button:active:not(:disabled) {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        button.secondary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        button.danger {
            background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);
        }

        .center-actions {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.show {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .modal-content {
            background: linear-gradient(135deg, rgba(48, 43, 99, 0.95), rgba(24, 36, 63, 0.95));
            padding: 35px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(100, 200, 255, 0.3);
            animation: slideUp 0.3s ease;
            max-width: 400px;
            width: 90%;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-content p {
            font-size: 1.2em;
            margin-bottom: 20px;
            color: #64c8ff;
            font-weight: 600;
        }

        .modal-content button {
            width: 100%;
            margin-top: 12px;
        }

        /* Loading Spinner */
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(100, 200, 255, 0.3);
            border-radius: 50%;
            border-top-color: #64c8ff;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #64c8ff;
        }

        /* Toast Messages */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            animation: slideInRight 0.3s ease;
            z-index: 2000;
        }

        .toast.error {
            background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
        }

        .toast.success {
            background: linear-gradient(135deg, #11998e, #38ef7d);
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            header h3 {
                font-size: 1.6em;
            }

            .upload {
                padding: 25px;
            }

            .modal-content {
                width: 95%;
            }

            .row {
                flex-direction: column;
            }

            .center-actions {
                flex-direction: column;
            }

            .center-actions button {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <header>
        <h3>Photo Compressor & Cropper</h3>
    </header>

    <div class="container">
        <div class="upload">
            <input type="file" id="fileInput" multiple accept="image/*">
        </div>
        <div id="imageList"></div>
        <div class="center-actions">
            <button id="downloadZip">Download all as ZIP</button>
            <!-- <button id="downloadAllPdf" class="secondary">Download all as PDF</button> -->
        </div>
    </div>

    <div class="modal" id="downloadModal">
        <div class="modal-content">
            <p>Download as:</p>
            <button id="downloadJpeg">JPEG</button>
            <button id="downloadPdf">PDF</button>
        </div>
    </div>

    <div class="modal" id="downloadZipModal">
        <div class="modal-content">
            <p>Download all as:</p>
            <button id="downloadZipJpeg">JPEG (ZIP)</button>
            <button id="downloadZipPdf">PDF (ZIP)</button>
        </div>
    </div>

    <script>
        const { jsPDF } = window.jspdf;
        let cropperMap = {};
        let currentDownloadImg = null;

        // Toast Message Function
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = 'slideOutRight 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Modal Management
        function openModal(modalId) {
            const modal = $(`#${modalId}`);
            modal.addClass('show');
        }

        function closeModal(modalId) {
            const modal = $(`#${modalId}`);
            modal.removeClass('show');
            modal.css('display', 'none');
        }

        // File Upload Handler
        $('#fileInput').on('change', function (e) {
            e.stopPropagation();
            const files = e.target.files;
            processFiles(files);
            // Reset the input so same file can be selected again
            this.value = '';
        });

        // Make upload box clickable
        $('.upload').on('click', function(e) {
            if (e.target.id !== 'fileInput') {
                $('#fileInput').click();
            }
        });

        $('.upload').on('dragover', function(e) {
            e.preventDefault();
            e.stopPropagation();
            $(this).css('border-color', '#64c8ff').css('background', 'rgba(100, 200, 255, 0.15)');
        });

        $('.upload').on('dragleave', function(e) {
            e.preventDefault();
            e.stopPropagation();
            $(this).css('border-color', 'rgba(100, 200, 255, 0.5)').css('background', 'linear-gradient(135deg, rgba(100, 200, 255, 0.05), rgba(142, 68, 255, 0.05))');
        });

        $('.upload').on('drop', function(e) {
            e.preventDefault();
            e.stopPropagation();
            $(this).css('border-color', 'rgba(100, 200, 255, 0.5)').css('background', 'linear-gradient(135deg, rgba(100, 200, 255, 0.05), rgba(142, 68, 255, 0.05))');
            
            const files = e.originalEvent.dataTransfer.files;
            processFiles(files);
        });

        function processFiles(files) {
            if (files.length === 0) return;

            let loadedCount = 0;
            for (let file of files) {
                if (!file.type.startsWith('image/')) {
                    showToast('Only image files allowed', 'error');
                    continue;
                }

                const reader = new FileReader();
                reader.onload = e => {
                    addImage(e.target.result, file.name);
                    loadedCount++;
                    if (loadedCount === files.length) {
                        showToast(`${files.length} image(s) uploaded successfully`, 'success');
                    }
                };
                reader.onerror = () => {
                    showToast(`Failed to load ${file.name}`, 'error');
                };
                reader.readAsDataURL(file);
            }
        }

        function addImage(src, fileName) {
            const id = Date.now() + Math.random();

            $('#imageList').append(`
  <div class="image-card" data-id="${id}" data-name="${fileName}" data-original="${src}">
    <button class="delete-btn">X</button>

    <div class="preview-box">
      <img src="${src}" id="img_${id}">
    </div>

    <div class="controls">
      <div class="row">
        <input type="text" class="customName" placeholder="Rename file" value="${fileName}">
      </div>

      <div class="row">
        <input type="number" class="manualWidth" placeholder="Width (px)">
        <input type="number" class="manualHeight" placeholder="Height (px)">
        <button class="resizeBtn">Resize</button>
      </div>

      <div class="row">
        <select class="ratio">
          <option value="NaN">Free</option>
          <option value="1">1:1</option>
          <option value="1.777">16:9</option>
        </select>
        <input type="number" class="targetSize" placeholder="Size (KB)">
        <button class="compress">Compress</button>
      </div>

      <div class="row">
        <button class="cropBtn">Start Crop</button>
        <button class="resetCrop danger" style="display:none;">Reset</button>
        <button class="downloadBtn">Download</button>
      </div>
    </div>
  </div>`);

            // Pre-populate width and height
            const imgElement = document.getElementById('img_' + id);
            imgElement.onload = function () {
                const card = $(`[data-id="${id}"]`);
                card.find('.manualWidth').val(imgElement.naturalWidth);
                card.find('.manualHeight').val(imgElement.naturalHeight);
            };
        }

        // DELETE
        $(document).on('click', '.delete-btn', function () {
            const card = $(this).closest('.image-card');
            const fileName = card.find('.customName').val();
            if (confirm(`Remove "${fileName}"?`)) {
                card.fadeOut(300, function() {
                    $(this).remove();
                    showToast('Image removed', 'success');
                });
            }
        });

        // CROP
        $(document).on('click', '.cropBtn', function () {
            const card = $(this).closest('.image-card');
            const id = card.data('id');
            const img = document.getElementById('img_' + id);

            if (cropperMap[id]) {
                const canvas = cropperMap[id].getCroppedCanvas();
                img.src = canvas.toDataURL('image/jpeg', 0.9);
                cropperMap[id].destroy();
                cropperMap[id] = null;
                $(this).text('Start Crop');
                card.find('.resetCrop').hide();
                showToast('Crop applied successfully', 'success');
                return;
            }

            const ratioVal = card.find('.ratio').val();
            const ratio = ratioVal === 'NaN' ? NaN : parseFloat(ratioVal);

            cropperMap[id] = new Cropper(img, {
                aspectRatio: ratio,
                viewMode: 1,
                autoCropArea: 1
            });

            $(this).text('Apply Crop');
            card.find('.resetCrop').show();
            showToast('Adjust crop area and click Apply Crop', 'success');
        });

        // RESET (restore ORIGINAL)
        $(document).on('click', '.resetCrop', function () {
            const card = $(this).closest('.image-card');
            const id = card.data('id');
            const img = document.getElementById('img_' + id);
            const original = card.attr('data-original');

            img.src = original;

            if (cropperMap[id]) {
                cropperMap[id].destroy();
                cropperMap[id] = null;
            }

            card.find('.cropBtn').text('Start Crop');
            card.find('.resetCrop').hide();
            showToast('Crop reset to original', 'success');
        });

        // COMPRESS
        $(document).on('click', '.compress', function () {
            const card = $(this).closest('.image-card');
            const img = card.find('img')[0];
            const targetKB = parseFloat(card.find('.targetSize').val());
            const btn = $(this);

            if (!targetKB) {
                showToast('Please enter target size in KB', 'error');
                return;
            }

            btn.prop('disabled', true);
            btn.html('<span class="spinner"></span> Compressing...');

            setTimeout(() => {
                let tempImg = new Image();
                tempImg.src = img.src;

                tempImg.onload = function () {
                    let canvas = document.createElement('canvas');
                    let ctx = canvas.getContext('2d');
                    canvas.width = tempImg.width;
                    canvas.height = tempImg.height;
                    ctx.drawImage(tempImg, 0, 0);

                    let quality = 0.9;
                    let dataUrl;

                    for (let i = 0; i < 12; i++) {
                        dataUrl = canvas.toDataURL('image/jpeg', quality);
                        let sizeKB = Math.round((dataUrl.length * 3) / 4 / 1024);
                        if (sizeKB <= targetKB) break;
                        quality -= 0.07;
                    }

                    img.src = dataUrl;
                    btn.prop('disabled', false);
                    btn.html('Compress');
                    showToast('Image compressed successfully', 'success');
                };
            }, 300);
        });

        // MANUAL RESIZE
        $(document).on('click', '.resizeBtn', function () {
            const card = $(this).closest('.image-card');
            const img = card.find('img')[0];
            const width = parseFloat(card.find('.manualWidth').val());
            const height = parseFloat(card.find('.manualHeight').val());
            const btn = $(this);

            if (!width || !height) {
                showToast('Please enter both width and height', 'error');
                return;
            }

            if (width <= 0 || height <= 0) {
                showToast('Width and height must be positive', 'error');
                return;
            }

            btn.prop('disabled', true);
            btn.html('<span class="spinner"></span> Resizing...');

            setTimeout(() => {
                let tempImg = new Image();
                tempImg.src = img.src;

                tempImg.onload = function () {
                    let canvas = document.createElement('canvas');
                    let ctx = canvas.getContext('2d');
                    canvas.width = width;
                    canvas.height = height;
                    ctx.drawImage(tempImg, 0, 0, width, height);
                    
                    img.src = canvas.toDataURL('image/jpeg', 0.9);
                    btn.prop('disabled', false);
                    btn.html('Resize');
                    showToast(`Image resized to ${width}x${height}px`, 'success');
                };
            }, 300);
        });

        // DOWNLOAD MODAL
        $(document).on('click', '.downloadBtn', function () {
            currentDownloadImg = $(this).closest('.image-card').find('img')[0];
            openModal('downloadModal');
        });

        $('#downloadJpeg').click(function () {
            const card = $(currentDownloadImg).closest('.image-card');
            const name = card.find('.customName').val() || card.data('name');

            const btn = $(this);
            btn.prop('disabled', true);
            btn.html('<span class="spinner"></span>');

            setTimeout(() => {
                const a = document.createElement('a');
                a.href = currentDownloadImg.src;
                a.download = name;
                a.click();

                btn.prop('disabled', false);
                btn.html('JPEG');
                closeModal('downloadModal');
                showToast('Image downloaded successfully', 'success');
            }, 300);
        });

        $('#downloadPdf').click(function () {
            const card = $(currentDownloadImg).closest('.image-card');
            const name = card.find('.customName').val() || card.data('name');
            const img = currentDownloadImg;

            const btn = $(this);
            btn.prop('disabled', true);
            btn.html('<span class="spinner"></span>');

            setTimeout(() => {
                const imgWidth = img.naturalWidth;
                const imgHeight = img.naturalHeight;
                const pdfWidth = imgWidth * 0.264583;
                const pdfHeight = imgHeight * 0.264583;
                
                const pdf = new jsPDF({
                    orientation: imgWidth > imgHeight ? 'landscape' : 'portrait',
                    unit: 'mm',
                    format: [pdfWidth, pdfHeight]
                });
                
                pdf.addImage(img.src, 'PNG', 0, 0, pdfWidth, pdfHeight);
                pdf.save(name.replace(/\.[^/.]+$/, '') + '.pdf');

                btn.prop('disabled', false);
                btn.html('PDF');
                closeModal('downloadModal');
                showToast('PDF downloaded successfully', 'success');
            }, 300);
        });

        $('#downloadModal').click(function (e) {
            if (e.target.id === 'downloadModal') closeModal('downloadModal');
        });

        // BULK DOWNLOAD
        $('#downloadZip').on('click', function () {
            const imageCount = $('#imageList .image-card').length;
            if (imageCount === 0) {
                showToast('Please upload at least one image', 'error');
                return;
            }
            openModal('downloadZipModal');
        });

        $('#downloadZipJpeg').on('click', function () {
            downloadZipWithFormat('jpeg');
        });

        $('#downloadZipPdf').on('click', function () {
            downloadZipWithFormat('pdf');
        });

        function downloadZipWithFormat(format) {
            const btn = format === 'jpeg' ? $('#downloadZipJpeg') : $('#downloadZipPdf');
            btn.prop('disabled', true);
            btn.html('<span class="spinner"></span> Processing...');

            setTimeout(() => {
                const zip = new JSZip();
                let fileCount = 0;

                $('#imageList .image-card').each(function (i) {
                    const img = $(this).find('img')[0];
                    const customName = $(this).find('.customName').val() || $(this).data('name') || `image_${i}.jpg`;
                    
                    if (format === 'jpeg') {
                        const base64 = img.src.split(',')[1];
                        zip.file(customName, base64, { base64: true });
                    } else if (format === 'pdf') {
                        const imgWidth = img.naturalWidth;
                        const imgHeight = img.naturalHeight;
                        const pdfWidth = imgWidth * 0.264583;
                        const pdfHeight = imgHeight * 0.264583;
                        
                        const pdf = new jsPDF({
                            orientation: imgWidth > imgHeight ? 'landscape' : 'portrait',
                            unit: 'mm',
                            format: [pdfWidth, pdfHeight]
                        });
                        
                        pdf.addImage(img.src, 'PNG', 0, 0, pdfWidth, pdfHeight);
                        const pdfName = customName.replace(/\.[^/.]+$/, '') + '.pdf';
                        zip.file(pdfName, pdf.output('blob'));
                    }
                    fileCount++;
                });

                zip.generateAsync({ type: 'blob' }).then(blob => {
                    saveAs(blob, 'images.zip');
                    btn.prop('disabled', false);
                    btn.html(format === 'jpeg' ? 'JPEG (ZIP)' : 'PDF (ZIP)');
                    closeModal('downloadZipModal');
                    showToast(`Downloaded ${fileCount} file(s) as ZIP`, 'success');
                }).catch(err => {
                    showToast('Failed to create ZIP file', 'error');
                    btn.prop('disabled', false);
                    btn.html(format === 'jpeg' ? 'JPEG (ZIP)' : 'PDF (ZIP)');
                });
            }, 300);
        }

        $('#downloadZipModal').click(function (e) {
            if (e.target.id === 'downloadZipModal') closeModal('downloadZipModal');
        });
    </script>
</body>

</html>
